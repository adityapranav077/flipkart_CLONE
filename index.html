<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart UI Clone</title>

    <!-- Link CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">
        <div class="logo">Flipkart</div>

        <div class="search-box">
            <input type="text" placeholder="Search for products...">
        </div>

        <div class="login-btn">Login</div>
    </div>

    <!-- Categories -->
    <div class="categories">
        <div class="category">Mobiles</div>
        <div class="category">Fashion</div>
        <div class="category">Electronics</div>
        <div class="category">Home</div>
        <div class="category">Appliances</div>
        <div class="category">Travel</div>
    </div>

    <!-- Products -->
    <div class="products">
        <div class="card">
            <img src="https://via.placeholder.com/150">
            <div class="title">iPhone 14</div>
            <div class="price">₹70,000</div>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/150">
            <div class="title">Samsung TV</div>
            <div class="price">₹40,000</div>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/150">
            <div class="title">Nike Shoes</div>
            <div class="price">₹5,000</div>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/150">
            <div class="title">Laptop</div>
            <div class="price">₹60,000</div>
        </div>
    </div>

</body>
</html>
